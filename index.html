<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>
<link rel="stylesheet" href="./css/index.css">
</head>

<body>

<main>

    <!-- LEFT COLUMN: MP3 PLAYER -->

    <div class="mp3-container">
        
        <div class="mp3-player">
            <audio id="audioPlayer"></audio>

            <div class="albumArt-container">
                <img id="albumArt" src="">
            </div>

            <h3 id="songTitle"></h3>

            <div class="progress-container">
                <input type="range" id="progressBar" value="0" min="0" max="100">
            </div>

            <div class="time-container">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>

            <div class="buttons-container">
                <button id="prev">Back</button>
                <button id="playpause">Play</button>
                <button id="next">Forward</button>
                <button id="shuffle">Shuffle</button>
            </div>

        </div>

    </div>



    <!-- MIDDLE COLUMN: JOKE + AMBIENT -->
    <div class="mid-column">

        <!-- TOP ROW: Joke -->
        <div class="jokes-container">
            <p id="jokes-text">Click to load joke</p>
            <button id="get-joke">New Joke</button>
        </div>

        <!-- BOTTOM ROW: Ambient Sounds -->
        <div class="ambientSounds-container">

            <div><button id="rain">Rain</button><input id="rainSlider" type="range" min="0" max="100"></div>
            <div><button id="thunder">Thunder</button><input id="thunderSlider" type="range" min="0" max="100"></div>
            <div><button id="waves">Waves</button><input id="wavesSlider" type="range" min="0" max="100"></div>
            <div><button id="wind">Wind</button><input id="windSlider" type="range" min="0" max="100"></div>
            <div><button id="fire">Fire</button><input id="fireSlider" type="range" min="0" max="100"></div>
            <div><button id="crickets">Crickets</button><input id="cricketsSlider" type="range" min="0" max="100"></div>
            <div><button id="whiteNoise">White Noise</button><input id="whiteNoiseSlider" type="range" min="0" max="100"></div>
            <div><button id="singingBowl">Singing Bowl</button><input id="singingBowlSlider" type="range" min="0" max="100"></div>

        </div>

    </div>


    <!-- RIGHT COLUMN: Surprise Invitation -->
    <div class="right-column">
        <div id="surpriseContainer" class="surprise-closed">
            Click for a surprise!!!!
        </div>
    </div>

</main>



<script src="./js/jquery.js"></script>
<script src="./js/mp3Player.js"></script>
<script src="./js/jokes.js"></script>
<script src="./js/ambient.js"></script>
<script src="./js/surprise.js"></script>

</body>
</html>
